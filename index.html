<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Navbar 1 - Boardroom Kailua</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Bootstrap JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<!-- Navbar -->
<div class="container-fluid px-0" style="background-color:#133B40;">
  <nav class="navbar navbar-expand-lg bg-gradient">
    <div class="container">
      <!-- Left: Instagram icon -->
      <ul class="nav justify-content-start">
        <li class="nav-item">
          <a class="navbar-brand text-white" href="#"><i class="bi bi-instagram"></i></a>
        </li>
      </ul>
      <!-- Center: Logo -->
      <ul class="nav justify-content-center">
        <li class="nav-item">
          <img src="boardroom-logo.png" alt="Boardroom Logo" height="50">
        </li>
      </ul>
      <!-- Right: Menu Button -->
      <ul class="nav justify-content-end">
        <li class="nav-item">
          <button class="btn btn-dark">Menu</button>
        </li>
      </ul>
    </div>
  </nav>
</div>

<!-- Page content -->
<div class="container mt-5">
  <h1>Page Content Here</h1>
  <p>Add your text and sections below the navbar.</p>
</div>

</body>
</html>
